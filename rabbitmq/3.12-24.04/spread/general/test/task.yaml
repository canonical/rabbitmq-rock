summary: test the 'rabbitmq-rock' project

execute: |
  apt update && apt install --yes python3-venv
  
  python3 -m venv /tmp/venv
  source /tmp/venv/bin/activate

  pip install -U pip && pip install -r requirements.txt

  docker run -d --name rabbitmq-server -p 5672:5672 rabbitmq:3.12-24.04
  docker exec rabbitmq-server /scripts/config-defaults.sh
  docker exec rabbitmq-server pebble restart rabbitmq-server
  sleep 10
  python3 test_messaging.py
