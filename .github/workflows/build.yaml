name: OCI Factory Workflows - Build rabbitmq Rock

on:
  push:

jobs:
  prepare-build:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Changed files
        uses: tj-actions/changed-files@531f5f7d163941f0c1c04e0ff4d8bb243ac4366f
        id: changed-files
        with:
          separator: ","
          dir_names: "true"
          files: |
            */rockcraft.y*ml

      - name: Set matrix
        id: set-matrix
        run: |
          set -ex
          changed="${{ steps.changed-files.outputs.all_changed_files }}"

          if [ -z "${changed}" ]; then
            # No rockcraft files changed; discover all version directories via glob
            changed="$(echo */rockcraft.y*ml | tr ' ' '\n' | cut -d '/' -f 1 | paste -sd ',')"
          fi

          matrix="["
          first=true
          IFS=',' read -ra dirs <<< "${changed}"
          for dir in "${dirs[@]}"; do
            # Normalise to the top-level version directory
            version="$(echo "${dir}" | cut -d '/' -f 1)"
            test -d "${version}"
            entry="{\"version\":\"${version}\",\"rockfile-directory\":\"${version}\"}"
            if [ "${first}" = "true" ]; then
              matrix="${matrix}${entry}"
              first=false
            else
              matrix="${matrix},${entry}"
            fi
          done
          matrix="${matrix}]"

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"


  build:
    needs: [prepare-build]
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare-build.outputs.matrix) }}
    uses: canonical/oci-factory/.github/workflows/Build-Rock.yaml@main
    with:
      oci-archive-name: "rabbitmq-rock-${{ matrix.version }}"
      rock-repo: "canonical/rabbitmq-rock"
      rock-repo-commit: "${{ github.sha }}"
      rockfile-directory: "${{ matrix.rockfile-directory }}"


  test:
    needs: [build, prepare-build]
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare-build.outputs.matrix) }}
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: rabbitmq-rock-${{ matrix.version }}

      - name: 'Set up test environment'
        run: pip install -r tests/requirements.txt

      - name: 'Set up skopeo'
        uses: warjiang/setup-skopeo@main
        with:
          version: latest

      - run: skopeo copy oci-archive:rabbitmq-rock-${{ matrix.version }} docker-daemon:test-img:${{ matrix.version }}

      - name: 'Smoking test'
        run: |
          set -e
          docker run -d --name rabbitmq-server -p 5672:5672 test-img:${{ matrix.version }}
          docker exec rabbitmq-server /scripts/config-defaults.sh
          docker exec rabbitmq-server pebble restart rabbitmq-server
          sleep 10
          python3 tests/integration/test_messaging.py
